<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Projects by Manuel</title>
  <meta name="description" content="A collection of personal tools and experiments by Manuel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <main class="container">
      <section class="hero card">
        <div class="hero-top">
          <div class="avatar-mark" aria-hidden="true">
            <span>M</span>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color mode">
            <span class="theme-toggle-label">Dark</span>
          </button>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">Personal Workspace</p>
          <h1>Projects by Manuel</h1>
          <p class="subtitle">A collection of personal tools and experiments</p>
        </div>
      </section>

      <section class="projects">
        <div class="section-head">
          <h2>Tools</h2>
          <p>Selected apps, dashboards, and experiments.</p>
        </div>
        <div class="card-grid" id="projectGrid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="footer">
      <a href="https://github.com/ieeks" target="_blank" rel="noreferrer">github.com/ieeks</a>
    </footer>
  </div>

  <script src="./script.js"></script>
</body>
</html>
