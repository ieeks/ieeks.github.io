<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Projects by Manuel</title>
  <meta name="description" content="A collection of personal tools and experiments by Manuel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <main class="container">
      <section class="hero card">
        <div class="hero-top">
          <div class="avatar" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8.5 8.5L4.5 12L8.5 15.5"/>
              <path d="M15.5 8.5L19.5 12L15.5 15.5"/>
              <path d="M13 6.5L11 17.5"/>
            </svg>
          </div>
          <label class="theme-switch" for="themeToggle" aria-label="Toggle color mode">
            <input class="theme-switch-input" id="themeToggle" type="checkbox" role="switch" aria-label="Toggle color mode">
            <span class="theme-switch-track">
              <span class="theme-switch-thumb"></span>
            </span>
          </label>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">Personal Workspace</p>
          <h1>Projects by Manuel</h1>
          <p class="subtitle">A collection of personal tools and experiments</p>
        </div>
      </section>

      <section class="projects">
        <div class="section-head">
          <h2>Tools</h2>
          <p>Selected apps, dashboards, and experiments.</p>
        </div>
        <div class="card-grid" id="projectGrid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="footer">
      <a href="https://github.com/ieeks" target="_blank" rel="noreferrer" aria-label="GitHub profile">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.86.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.72 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.92c.85 0 1.71.12 2.51.36 1.91-1.33 2.75-1.05 2.75-1.05.55 1.42.2 2.46.1 2.72.64.72 1.03 1.63 1.03 2.75 0 3.95-2.35 4.81-4.59 5.07.36.32.68.95.68 1.92 0 1.38-.01 2.5-.01 2.84 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"/>
        </svg>
      </a>
    </footer>
  </div>

  <script src="./script.js"></script>
</body>
</html>
